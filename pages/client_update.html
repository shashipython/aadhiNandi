<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Update</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="client-update-page">
<header>
    <nav>
        <a href="../index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main class="client-update-main">
    <section class="client-update-card">
        <div class="client-update-heading">
            <span class="client-update-badge">Client Management</span>
            <h1>Update Client Details</h1>
            <p>Submit the latest client information to the update API.</p>
        </div>

        <form id="clientUpdateForm" class="client-update-form">
            <div class="client-update-grid">
                <div class="client-update-field">
                    <label for="name">Client Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter client name" required>
                </div>

                <div class="client-update-field">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" placeholder="Enter last name" required>
                </div>

                <div class="client-update-field">
                    <label for="dob">DOB</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <div class="client-update-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter email address" required>
                </div>

                <div class="client-update-field">
                    <label for="mobile_number">Mobile Number</label>
                    <input type="tel" id="mobile_number" name="mobile_number" placeholder="Enter mobile number" pattern="[0-9]{10}" required>
                </div>

                <div class="client-update-field">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="">Select category</option>
                        <option value="Aadhi Nandhi co op credit society">Aadhi Nandhi co op credit society</option>
                        <option value="Shubhchintan chits pvt ltd">Shubhchintan chits pvt ltd</option>
                        <option value="Mutual fund">Mutual fund</option>
                        <option value="Life Insurance">Life Insurance</option>
                        <option value="Generall Insurance">Generall Insurance</option>
                        <option value="Health insurance">Health insurance</option>
                        <option value="Group term life">Group term life</option>
                        <option value="Group mediclaim plan">Group mediclaim plan</option>
                        <option value="Travel insurance">Travel insurance</option>
                    </select>
                </div>
            </div>

            <div class="client-update-actions">
                <button type="submit" class="btn client-update-submit">Submit</button>
                <button type="reset" class="client-update-reset">Reset</button>
            </div>

            <p id="formMessage" class="client-update-message" aria-live="polite"></p>
        </form>
    </section>
</main>

<button
    type="button"
    id="downloadClientDetailsButton"
    class="client-download-button"
    aria-label="Download client details in Excel format"
>
    <i class="fas fa-file-excel" aria-hidden="true"></i>
    <span>Download Excel</span>
</button>

<footer>
    <div class="footer-container">
        <p>© 2026 Secure Fund Group</p>
        <p>Email: info@cooperative.com | Phone: +91 9876543210</p>
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</footer>

<script>
    const clientUpdateForm = document.getElementById("clientUpdateForm");
    const formMessage = document.getElementById("formMessage");
    const downloadClientButton = document.getElementById("downloadClientDetailsButton");

    function setFormMessage(message, type) {
        formMessage.textContent = message;
        formMessage.className = "client-update-message";

        if (type) {
            formMessage.classList.add(type);
        }
    }

    function flattenRecord(record, parentKey, output) {
        const currentParentKey = parentKey || "";
        const currentOutput = output || {};

        Object.entries(record || {}).forEach(function ([key, value]) {
            const nextKey = currentParentKey ? currentParentKey + "." + key : key;

            if (Array.isArray(value)) {
                currentOutput[nextKey] = value.map(function (item) {
                    if (item && typeof item === "object") {
                        return JSON.stringify(item);
                    }

                    return item == null ? "" : item;
                }).join(", ");
                return;
            }

            if (value && typeof value === "object") {
                flattenRecord(value, nextKey, currentOutput);
                return;
            }

            currentOutput[nextKey] = value == null ? "" : value;
        });

        return currentOutput;
    }

    function extractRows(responseData) {
        if (Array.isArray(responseData)) {
            return responseData;
        }

        if (responseData && typeof responseData === "object") {
            const arrayValue = Object.values(responseData).find(function (value) {
                return Array.isArray(value);
            });

            if (arrayValue) {
                return arrayValue;
            }

            return [responseData];
        }

        return [];
    }

    function parseJsonSafely(value) {
        if (typeof value !== "string") {
            return value;
        }

        try {
            return JSON.parse(value);
        } catch (error) {
            return value;
        }
    }

    async function readApiResponse(response) {
        const rawText = await response.text();
        let parsedData = parseJsonSafely(rawText);

        if (parsedData && typeof parsedData === "object" && Object.prototype.hasOwnProperty.call(parsedData, "body")) {
            parsedData = parseJsonSafely(parsedData.body);
        }

        return {
            parsedData: parsedData,
            rawText: rawText
        };
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function escapeCsv(value) {
        const stringValue = String(value == null ? "" : value);
        return '"' + stringValue.replace(/"/g, '""') + '"';
    }

    function downloadExcelFromRows(rows) {
        if (!rows.length) {
            throw new Error("No client details were returned by the API.");
        }

        const flattenedRows = rows.map(function (row) {
            return flattenRecord(row);
        });
        const headers = Array.from(new Set(flattenedRows.flatMap(function (row) {
            return Object.keys(row);
        })));
        const tableHeader = headers.map(function (header) {
            return "<th>" + escapeHtml(header) + "</th>";
        }).join("");
        const tableBody = flattenedRows.map(function (row) {
            const cells = headers.map(function (header) {
                return "<td>" + escapeHtml(row[header] || "") + "</td>";
            }).join("");
            return "<tr>" + cells + "</tr>";
        }).join("");

        const csvLines = [];
        csvLines.push(headers.map(function (header) {
            return escapeCsv(header);
        }).join(","));

        flattenedRows.forEach(function (row) {
            csvLines.push(headers.map(function (header) {
                return escapeCsv(row[header]);
            }).join(","));
        });

        const blob = new Blob(["\ufeff", csvLines.join("\r\n")], {
            type: "text/csv;charset=utf-8;"
        });
        const downloadUrl = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const dateStamp = new Date().toISOString().slice(0, 10);

        link.href = downloadUrl;
        link.download = "client-details-" + dateStamp + ".csv";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(downloadUrl);
    }

    clientUpdateForm.addEventListener("submit", async function (event) {
        event.preventDefault();

        const submitButton = clientUpdateForm.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.textContent = "Submitting...";
        setFormMessage("Submitting client details...", "info");

        const payload = {
            name: document.getElementById("name").value.trim(),
            last_name: document.getElementById("last_name").value.trim(),
            dob: document.getElementById("dob").value,
            category: document.getElementById("category").value,
            email: document.getElementById("email").value.trim(),
            mobile_number: document.getElementById("mobile_number").value.trim()
        };

        try {
            const response = await fetch(
                "https://3vcm8ag0ll.execute-api.us-east-1.amazonaws.com/aadhi_update_client_api_deploy/aadhi_update_client_details",
                {
                    method: "POST",
                    body: JSON.stringify(payload)
                }
            );

            let responseData = null;
            try {
                responseData = await response.json();
            } catch (jsonError) {
                responseData = null;
            }

            if (!response.ok) {
                const errorMessage = responseData && responseData.message
                    ? responseData.message
                    : "Unable to update client details. Please try again.";
                throw new Error(errorMessage);
            }

            const successMessage = responseData && responseData.message
                ? responseData.message
                : "Client added sucussfull message";

            setFormMessage(successMessage, "success");
            clientUpdateForm.reset();
        } catch (error) {
            setFormMessage(error.message || "Something went wrong while updating the client.", "error");
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = "Submit";
        }
    });

    clientUpdateForm.addEventListener("reset", function () {
        window.setTimeout(function () {
            setFormMessage("", "");
        }, 0);
    });

    async function handleClientDownload() {
        const downloadButtonLabel = downloadClientButton.querySelector("span");

        downloadClientButton.disabled = true;
        downloadClientButton.classList.add("is-loading");
        downloadButtonLabel.textContent = "Downloading...";
        setFormMessage("Fetching client details for download...", "info");

        try {
            const response = await fetch(
                "https://ph34p6lq31.execute-api.us-east-1.amazonaws.com/default/aadhi_get_client_details"
            );
            const apiResponse = await readApiResponse(response);
            const responseData = apiResponse.parsedData;
            const rows = extractRows(responseData);

            if (!response.ok) {
                throw new Error("Unable to fetch client details for download. Status: " + response.status);
            }

            if (!rows.length) {
                throw new Error(
                    apiResponse.rawText && apiResponse.rawText.trim()
                        ? "API responded, but no downloadable client rows were found."
                        : "API response was empty."
                );
            }

            downloadExcelFromRows(rows);
            setFormMessage("Client details downloaded successfully.", "success");
        } catch (error) {
            setFormMessage(error.message || "Something went wrong while downloading the client details.", "error");
        } finally {
            downloadClientButton.disabled = false;
            downloadClientButton.classList.remove("is-loading");
            downloadButtonLabel.textContent = "Download Excel";
        }
    }

    if (downloadClientButton) {
        downloadClientButton.addEventListener("click", handleClientDownload);
    }
</script>
</body>
</html>
